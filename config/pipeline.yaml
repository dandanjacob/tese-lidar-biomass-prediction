# Configuração do pipeline de dados
# Estado atual: etapas 1-3 implementadas

lidar:
  dataset_doi: "10.3334/ORNLDAAC/1515"
  raw_dir: data/raw/lidar               # tiles .laz baixados do ORNL DAAC
  tile_inventory_csv: cms_brazil_lidar_tile_inventory.csv

inventory:
  raw_dir: data/raw/inventory            # arquivos .csv e .kmz baixados do ORNL DAAC

intersections:
  kml_dir: data/processed/kml            # KMLs extraídos dos KMZs (etapa 1)
  output_dir: data/processed/intersections  # cruzamento espacial LiDAR × parcelas (etapa 2)

clipped_lidar:
  output_dir: data/processed/clipped_lidar  # nuvens de pontos recortadas por parcela (etapa 3)
